name: CI/CD

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install
        run: pip install -e .
      - name: Test
        run: pytest tests/ --ignore=tests/dast/

  dast:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install
        run: pip install -e .
      - name: Start services
        run: docker compose up -d
      - name: Wait for services
        run: sleep 10
      - name: Run DAST tests
        run: pytest tests/dast/
      - name: Stop services
        if: always()
        run: docker compose down

  github-release:
    runs-on: ubuntu-latest
    needs: [test, dast]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" dist/* --repo "${{ github.repository }}"

  publish:
    runs-on: ubuntu-latest
    needs: [test, dast]
    permissions:
      id-token: write
    environment:
      name: ${{ github.event.release.prerelease && 'testpypi' || 'pypi' }}
      url: ${{ github.event.release.prerelease && format('https://test.pypi.org/p/{0}', github.event.repository.name) || format('https://pypi.org/p/{0}', github.event.repository.name) }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ github.event.release.prerelease && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}

  docker:
    runs-on: ubuntu-latest
    needs: [test, dast]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Check for Dockerfile
        id: dockerfile
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Compute Docker tags
        if: steps.dockerfile.outputs.exists == 'true'
        id: tags
        run: |
          TAGS="ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
          if [ "${{ github.event.release.prerelease }}" == "true" ]; then
            TAGS="$TAGS
          ghcr.io/${{ github.repository }}:edge"
          else
            TAGS="$TAGS
          ghcr.io/${{ github.repository }}:latest"
          fi
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
